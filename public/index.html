<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Food Delivery Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
    }
    header {
      background: #ff5722;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    .container {
      padding: 1.5rem;
      max-width: 700px;
      margin: auto;
    }
    .menu-item {
      background: white;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }
    .error {
      color: #c0392b;
      text-align: center;
      padding: 1rem;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <h1>🍔 Food Delivery Menu</h1>
  <p id="version">Loading version...</p>
</header>

<div class="container" id="menu">
  Loading menu...
</div>

<footer>
  <p>Food Menu Service • CI/CD Demo</p>
</footer>

<script>
  async function loadMenu() {
    const menuDiv = document.getElementById("menu");
    try {
      const res = await fetch("/api/menu");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      menuDiv.innerHTML = "";
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "menu-item";

        const name = document.createElement("strong");
        name.textContent = item.name;

        const price = document.createElement("span");
        price.textContent = `₹${item.price}`;

        div.appendChild(name);
        div.appendChild(price);
        menuDiv.appendChild(div);
      });
    } catch (err) {
      console.error("Failed to load menu:", err);
      menuDiv.innerHTML = `<p class="error">Failed to load menu. Please try again.</p>`;
    }
  }

  async function loadVersion() {
    const versionEl = document.getElementById("version");
    try {
      const res = await fetch("/version");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      versionEl.textContent = `Version: ${data.version}`;
    } catch (err) {
      console.error("Failed to load version:", err);
      versionEl.textContent = "Version unavailable";
    }
  }

  loadMenu();
  loadVersion();
</script>

</body>
</html>
